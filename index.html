<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Verification -->
    <meta
      name="google-site-verification"
      content="XHqF--CPpQRVnwiJIk90RVK4ZpyI3KWt0eMI0ytbpmg"
    />

    <!-- Title (Optimized for Ranking) -->
    <title>
      Vinttrix Edge - Web Development & CRM Automation Company in India
    </title>

    <!-- SEO Meta -->
    <meta
      name="description"
      content="Vinttrix Edge is a web development and CRM automation company in India offering digital marketing and e-commerce solutions to grow your business."
    />
    <meta name="author" content="Vinttrix Edge" />

    <!-- Favicon (Fixed spelling) -->
    <link rel="icon" type="image/png" href="/vinttrix-edge-2.png" />

    <!-- Open Graph (Social Sharing) -->
    <meta
      property="og:title"
      content="Vinttrix Edge - Web Development & CRM Automation"
    />
    <meta
      property="og:description"
      content="We build websites, CRM systems, and marketing solutions to grow your business."
    />
    <meta property="og:image" content="/vinttrix-edge-2.png" />
    <meta property="og:url" content="https://vinttrix-edge.vercel.app/" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vinttrix Edge" />
    <meta
      name="twitter:description"
      content="Web development, CRM automation, and digital marketing solutions."
    />
    <meta name="twitter:image" content="/vinttrix-edge-2.png" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://vinttrix-edge.vercel.app/" />

    <!-- Schema Markup (Improved) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Vinttrix Edge",
        "url": "https://vinttrix-edge.vercel.app/",
        "logo": "https://vinttrix-edge.vercel.app/vinttrix-edge-2.png",
        "sameAs": [
          "https://www.instagram.com/vinttrixedge",
          "https://www.linkedin.com/company/vinttrixedge"
        ]
      }
    </script>
  </head>

  <body>
    <!-- H1 for SEO (Very Important) -->
    <h1 style="display: none">
      Vinttrix Edge - Web Development & CRM Automation Company
    </h1>

    <div id="root"></div>

    <!-- React Entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
