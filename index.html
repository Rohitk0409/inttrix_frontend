<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--  Google Verification  -->
    <meta
      name="google-site-verification"
      content="XHqF--CPpQRVnwiJIk90RVK4ZpyI3KWt0eMI0ytbpmg"
    />

    <!-- Title (VERY IMPORTANT) -->
    <title>
      Vinttrix Edge | Web Development, CRM & Digital Marketing Agency
    </title>

    <!-- SEO Meta -->
    <meta
      name="description"
      content="Vinttrix Edge provides web development, CRM automation, digital marketing, and e-commerce solutions to grow your business in India."
    />
    <meta
      name="keywords"
      content="web development company, CRM automation, digital marketing agency, e-commerce solutions, Noida, Delhi NCR"
    />
    <meta name="author" content="Vinttrix Edge" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/vinttrix-egde-2.png" />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Vinttrix Edge | Grow Your Business Online"
    />
    <meta
      property="og:description"
      content="Web development, CRM systems, and digital marketing solutions for modern businesses."
    />
    <meta property="og:image" content="/vinttrix-egde-2.png" />
    <meta property="og:url" content="https://vinttrix-edge.vercel.app" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vinttrix Edge" />
    <meta
      name="twitter:description"
      content="We build websites, automate CRM, and scale your business."
    />
    <meta name="twitter:image" content="/vinttrix-egde-2.png" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://vinttrix-edge.vercel.app/" />

    <!-- Schema Markup -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Vinttrix Edge",
        "url": "https://vinttrix-edge.vercel.app",
        "logo": "https://vinttrix-edge.vercel.app/vinttrix-egde-2.png",
        "sameAs": ["https://www.instagram.com/", "https://www.linkedin.com/"]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>

    <!-- React Entry -->
    <script type="module" src="/src/main.jsx"></script>

</html>
